<!--
==============================================================================
File: quiz.html
Path: quiz.html
Project: Learning Dashboard

Description:
Quiz runner page. Reads ?quiz=<file> from URL; quiz-page.js loads the
quiz modules and boots QuizEngine. Supports multiple print formats,
clipboard export, search/filter, shuffle, bookmarks, flagging, study
ratings, timed mode, and localStorage-backed progress.

Author: Namrata Mulwani
Created: —
Last Updated: 2026-06-30

Dependencies:
- css/styles.css
- css/quiz/quiz.css
- js/shared/site-config.js
- js/quiz/quiz-page.js (loads quiz-engine, quiz-toolbar, quiz-print,
  quiz-search, quiz-export)
- data/quiz/<file>.json (fetched at runtime by QuizEngine)
==============================================================================
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Interactive AWS quiz with detailed answer explanations. Learn AWS concepts through guided quiz questions with comprehensive explanations and resources.">
    <meta name="keywords" content="AWS quiz, AWS practice questions, AWS certification prep, interactive AWS learning">

    <meta property="og:title" content="Quiz - Learning Dashboard">
    <meta property="og:description"
        content="Interactive AWS quiz with detailed answer explanations and learning resources.">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://namrata2709.github.io/Resources/quiz.html">
    <meta property="og:image" content="https://namrata2709.github.io/Resources/images/quiz-preview.png">

    <meta name="twitter:title" content="Quiz - Learning Dashboard">
    <meta name="twitter:description" content="Interactive AWS quiz with detailed explanations.">
    <meta name="twitter:image" content="https://namrata2709.github.io/Resources/images/quiz-preview.png">

    <link rel="canonical" href="https://namrata2709.github.io/Resources/quiz.html">

    <title>Quiz - Learning Dashboard</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/quiz/quiz.css">
    <script src="js/shared/site-config.js"></script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Quiz",
      "name": "AWS Quiz",
      "description": "Interactive quiz with detailed answer explanations for AWS concepts",
      "url": "https://namrata2709.github.io/Resources/quiz.html",
      "author": { "@type": "Person", "name": "Namrata Mulwani", "email": "awslecturenotes@gmail.com" },
      "publisher": { "@type": "Person", "name": "Namrata Mulwani" },
      "inLanguage": "en",
      "isPartOf": {
        "@type": "WebSite",
        "name": "Learning Dashboard",
        "url": "https://namrata2709.github.io/Resources/"
      },
      "educationalUse": "Assessment",
      "educationalLevel": "Beginner to Intermediate"
    }
    </script>
</head>
<!--
    data-back-label → back button text (consumed by navigation.js, not
    uploaded/confirmed this session)

    NOTE: data-subject is NOT read off <body>. footer.js reads it off
    #footerRoot itself (root.dataset.subject) — see the div below. Fixed
    2026-07-03: #footerRoot previously had no data-subject at all, so the
    AWS disclaimer never rendered on any quiz.
-->

<body>
    <noscript>
        <style>#pageLoader { display: none; }</style>
        <div class="noscript">
            <h2>JavaScript Required</h2>
            <p>This website relies on JavaScript for navigation and interactive learning features.</p>
            <p>Please enable JavaScript.</p>
        </div>
    </noscript>
    <!-- Page Loader — hardcoded so it shows before any JS runs -->
    <div id="pageLoader" class="page-loader">
        <div class="loader-spinner"></div>
        <p class="loader-text">Loading questions...</p>
    </div>

    <!--
        Injected by shared scripts (in order):
          shared-meta.js  → author, robots, og:site_name, twitter:card, theme-color, color-scheme
          theme.js        → #themeToggle button + applies saved theme
          footer.js       → <footer> into #footerRoot, AWS disclaimer via data-subject
          analytics.js    → GA
          page-loader.js  → hides #pageLoader on window load

        Then quiz-page.js loads quiz modules and boots QuizEngine.
    -->

    <div class="page-container">
        <!--
            .page-header injected here by navigation.js.
            quiz-page.js updates #pageTitle + breadcrumb last crumb
            after fetching the quiz JSON and reading its real title.
        -->

        <!--
            QuizEngine inserts: progress bar, toolbar, navigator,
            search filter — all before #questionsContainer.
        -->
        <div id="questionsContainer">
            <div class="loading">Loading questions...</div>
        </div>
    </div>

    <!-- Print Button -->
    <button class="print-button" aria-label="Print this quiz">
        <span class="print-icon">🖨️</span>
        <span class="print-text">Print</span>
    </button>

    <div id="footerRoot" data-subject="aws"></div>


    <!-- Quiz bootloader — loads quiz modules then boots engine -->
    <script src="js/quiz/quiz-page.js" defer></script>
</body>

</html>
