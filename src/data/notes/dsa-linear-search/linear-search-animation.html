<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear Search — Animation</title>
<link rel="stylesheet" href="../../../css/notes/dsa/animation-core.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

<div class="anim-header">
    <div class="anim-title">Linear Search</div>
    <div class="anim-subtitle">Interactive step-by-step animation</div>
</div>

<div class="input-panel">
    <div class="input-group" data-box="array-number">
    <label>Array (comma-separated numbers)</label>
    <input type="text" id="inputArray" value="3,7,1,9,4,6,2,8" maxlength="80">
</div>
    <div class="input-group" data-box="target-number">
    <label>Target</label>
    <input type="text" id="inputTarget" value="4" maxlength="10">
</div>
    <button class="run-btn" onclick="initAnimation()">Run</button>
    <div class="input-error" id="inputError"></div>
</div>

<div class="step-label" id="stepLabel"><strong>Press Run</strong> to begin.</div>

<div class="anim-canvas" id="animCanvas" data-renderer="array"></div>

<div class="decision-banner" id="decisionBanner"></div>

<div class="status-bar" id="statusBar"></div>

<div class="controls">
    <button class="ctrl-btn" id="btnPrev" onclick="goStep(-1)" disabled>&#9664; Prev</button>
    <button class="ctrl-btn primary" id="btnPlayPause" onclick="togglePlay()">&#9654; Play</button>
    <button class="ctrl-btn" id="btnNext" onclick="goStep(1)" disabled>Next &#9654;</button>
    <button class="ctrl-btn" onclick="initAnimation()">&#8635; Restart</button>
    <div class="step-counter" id="stepCounter">Step 0 / 0</div>
</div>

<script src="../../../js/notes/dsa/animation/animation-core.js"></script>
<script src="../../../js/notes/dsa/animation/renderer-array.js"></script>
<script>
// ── computeSteps() — topic specific, inlined since unique per topic ──
function computeSteps(input) {
    const arr = input.array;
    const target = input.target;
    const steps = [];
    const eliminated = [];

    // Initial state
    steps.push({
        active: [],
        eliminated: [],
        found: null,
        pointers: { i: 0 },
        label: `Initial state — searching for ${target} in [${arr.join(', ')}]`,
        decision: ""
    });

    for (let i = 0; i < arr.length; i++) {
        if (arr[i] === target) {
            steps.push({
                active: [i],
                eliminated: [...eliminated],
                found: i,
                pointers: { i },
                label: `arr[${i}] = ${arr[i]} — match found! Returning index ${i}`,
                decision: `${arr[i]} == ${target} → found at index ${i}`
            });
            return steps;
        } else {
            eliminated.push(i);
            steps.push({
                active: [],
                eliminated: [...eliminated],
                found: null,
                pointers: { i },
                label: `arr[${i}] = ${arr[i]} — not a match, continue`,
                decision: `${arr[i]} ≠ ${target} → move to index ${i + 1}`
            });
        }
    }

    // Not found
    steps.push({
        active: [],
        eliminated: [...eliminated],
        found: null,
        pointers: { i: arr.length },
        label: `Search complete — ${target} not found in array, returning -1`,
        decision: `All ${arr.length} elements checked, target absent → return -1`
    });

    return steps;
}

// ── boot ──
window.addEventListener('load', initAnimation);
window.addEventListener('resize', () => { if (typeof current !== 'undefined' && current >= 0) renderStep(current); });
</script>
</body>
</html>
